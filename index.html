
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Build a Simple Working Loom – Step by Step</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }
  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    z-index: 10;
  }
  button {
    display: block;
    margin: 4px 0;
    padding: 6px 10px;
    width: 140px;
    cursor: pointer;
  }
  #label {
    margin-top: 8px;
    font-weight: bold;
    font-size: 14px;
  }
  svg {
    width: 100vw;
    height: 100vh;
    background: #e9e9e9;
  }
  .frame { fill: #b08b62; }
  .rod { fill: #d2b48c; }
  .warp { stroke: #ffffff; stroke-width: 3; }
  .heddle { fill: #9c7a4f; }
  .cloth { fill: #3366ff; }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="controls">
  <button onclick="setStep(1)">Step 1: Frame</button>
  <button onclick="setStep(2)">Step 2: Rods</button>
  <button onclick="setStep(3)">Step 3: Warp</button>
  <button onclick="setStep(4)">Step 4: Heddle</button>
  <button onclick="setStep(5)">Step 5: Weaving</button>
  <div id="label">Step 1: Build the cardboard frame</div>
</div>

<svg viewBox="0 0 800 500">
  <!-- Frame -->
  <rect class="frame step1" x="100" y="80" width="600" height="40"/>
  <rect class="frame step1" x="100" y="80" width="40" height="300"/>
  <rect class="frame step1" x="660" y="80" width="40" height="300"/>

  <!-- Rods -->
  <rect class="rod step2" x="140" y="110" width="520" height="10"/>
  <rect class="rod step2" x="140" y="200" width="520" height="10"/>
  <rect class="rod step2" x="140" y="360" width="520" height="10"/>

  <!-- Warp threads -->
  <g class="step3">
    <line class="warp" x1="180" y1="120" x2="180" y2="360"/>
    <line class="warp" x1="220" y1="120" x2="220" y2="360"/>
    <line class="warp" x1="260" y1="120" x2="260" y2="360"/>
    <line class="warp" x1="300" y1="120" x2="300" y2="360"/>
    <line class="warp" x1="340" y1="120" x2="340" y2="360"/>
    <line class="warp" x1="380" y1="120" x2="380" y2="360"/>
    <line class="warp" x1="420" y1="120" x2="420" y2="360"/>
    <line class="warp" x1="460" y1="120" x2="460" y2="360"/>
    <line class="warp" x1="500" y1="120" x2="500" y2="360"/>
    <line class="warp" x1="540" y1="120" x2="540" y2="360"/>
    <line class="warp" x1="580" y1="120" x2="580" y2="360"/>
    <line class="warp" x1="620" y1="120" x2="620" y2="360"/>
  </g>

  <!-- Heddle -->
  <rect class="heddle step4" x="200" y="170" width="400" height="14"/>

  <!-- Cloth -->
  <rect class="cloth step5" x="200" y="360" width="400" height="30"/>
</svg>

<script>
function setStep(n) {
  document.querySelectorAll('.step1,.step2,.step3,.step4,.step5')
    .forEach(el => el.classList.add('hidden'));

  for (let i = 1; i <= n; i++) {
    document.querySelectorAll('.step' + i)
      .forEach(el => el.classList.remove('hidden'));
  }

  const labels = {
    1: "Step 1: Build the cardboard frame",
    2: "Step 2: Insert wooden rods",
    3: "Step 3: Add warp threads (tied top to bottom)",
    4: "Step 4: Add heddle bar (lifts every other thread)",
    5: "Step 5: Weave and roll cloth"
  };
  document.getElementById("label").innerText = labels[n];
}
setStep(1);
</script>

</body>
</html>
