<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cardboard Loom – Pseudo 3D</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eee;
  display: flex;
  height: 100vh;
}

#steps {
  width: 220px;
  background: #fff;
  padding: 12px;
  border-right: 1px solid #ccc;
}

#scene {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 900px;
}

/* ===== Loom Container ===== */
.loom {
  position: relative;
  width: 300px;
  height: 420px;
  transform-style: preserve-3d;
  transform: rotateX(12deg) rotateY(-18deg);
}

/* ===== Frame ===== */
.frame {
  position: absolute;
  background: #8b5a2b;
}

.left { width: 20px; height: 420px; left: 0; top: 0; }
.right { width: 20px; height: 420px; right: 0; top: 0; }
.top { height: 20px; width: 300px; top: 0; }
.bottom { height: 20px; width: 300px; bottom: 0; }

/* ===== Rods ===== */
.rod {
  position: absolute;
  width: 260px;
  height: 10px;
  background: #d2b48c;
  left: 20px;
  transform: translateZ(20px);
}

.rod.top { top: 50px; }
.rod.bottom { bottom: 50px; }

/* ===== Warp Threads ===== */
.warp {
  position: absolute;
  width: 2px;
  height: 280px;
  background: #eee;
  top: 70px;
  transform: translateZ(15px);
}

/* ===== Heddle ===== */
.heddle {
  position: absolute;
  width: 260px;
  height: 8px;
  background: #999;
  left: 20px;
  top: 190px;
  transform: translateZ(30px);
}

/* ===== Cloth ===== */
.cloth {
  position: absolute;
  width: 260px;
  height: 90px;
  background: #4a90e2;
  left: 20px;
  bottom: 60px;
  transform: translateZ(10px);
  opacity: 0.9;
}

/* ===== Utilities ===== */
.hidden { display: none; }
button { width: 100%; margin-bottom: 6px; padding: 6px; }
</style>
</head>

<body>

<div id="steps">
  <h3>Build Steps</h3>
  <button onclick="step(1)">1. Frame</button>
  <button onclick="step(2)">2. Rods</button>
  <button onclick="step(3)">3. Warp</button>
  <button onclick="step(4)">4. Heddle</button>
  <button onclick="step(5)">5. Cloth</button>
</div>

<div id="scene">
  <div class="loom">

    <!-- Frame -->
    <div class="frame left hidden framePart"></div>
    <div class="frame right hidden framePart"></div>
    <div class="frame top hidden framePart"></div>
    <div class="frame bottom hidden framePart"></div>

    <!-- Rods -->
    <div class="rod top hidden rodPart"></div>
    <div class="rod bottom hidden rodPart"></div>

    <!-- Warp -->
    <script>
      for (let i = 0; i < 20; i++) {
        document.write(
          `<div class="warp hidden warpPart" style="left:${30 + i * 12}px"></div>`
        );
      }
    </script>

    <!-- Heddle -->
    <div class="heddle hidden heddlePart"></div>

    <!-- Cloth -->
    <div class="cloth hidden clothPart"></div>

  </div>
</div>

<script>
function step(n) {
  document.querySelectorAll('.framePart,.rodPart,.warpPart,.heddlePart,.clothPart')
    .forEach(e => e.classList.add('hidden'));

  if (n >= 1) document.querySelectorAll('.framePart').forEach(e => e.classList.remove('hidden'));
  if (n >= 2) document.querySelectorAll('.rodPart').forEach(e => e.classList.remove('hidden'));
  if (n >= 3) document.querySelectorAll('.warpPart').forEach(e => e.classList.remove('hidden'));
  if (n >= 4) document.querySelector('.heddlePart').classList.remove('hidden');
  if (n >= 5) document.querySelector('.clothPart').classList.remove('hidden');
}
</script>

</body>
</html>
